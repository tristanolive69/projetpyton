<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deux Serpents Animés</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Ajout de Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle at center, #1e3a5f 0%, #0c1b2e 70%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 100px rgba(70, 130, 180, 0.3);
            border: 2px solid rgba(100, 150, 200, 0.3);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 18px;
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #e0d5c1;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(150, 200, 255, 0.8);
            letter-spacing: 4px;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Style du bouton de navigation */
        .nav-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            pointer-events: auto;
        }
        
        .nav-button:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 210, 255, 0.5);
            background: linear-gradient(135deg, #1ae5ff, #4a8df5);
        }
        
        .nav-button i {
            font-size: 18px;
        }
        
        /* Ajustement de la position du texte info */
        .info {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 210, 230, 0.7);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🐍 LES DEUX SERPENTS 🐍</div>
        <canvas id="snakeCanvas"></canvas>
        
        <!-- Bouton de navigation vers python.html -->
        <a href="python.html" class="nav-button">
            <i class="fab fa-python"></i> Voir le projet Python
        </a>
        
        <div class="info">Serpent Vert • Serpent Pourpre</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('snakeCanvas');
            const ctx = canvas.getContext('2d');
            
            // Ajuster la résolution du canvas
            function resizeCanvas() {
                const container = canvas.parentElement;
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            const width = () => canvas.width;
            const height = () => canvas.height;
            
            // Classe Serpent
            class Serpent {
                constructor(couleurTete, couleurCorps, couleurVentre, x, y, direction, vitesse, nom) {
                    this.segments = [];
                    this.longueurMax = 45;
                    this.epaisseur = 14;
                    this.couleurTete = couleurTete;
                    this.couleurCorps = couleurCorps;
                    this.couleurVentre = couleurVentre;
                    this.direction = direction;
                    this.vitesse = vitesse;
                    this.nom = nom;
                    this.amplitudeOnde = 40 + Math.random() * 20;
                    this.frequenceOnde = 0.03 + Math.random() * 0.02;
                    this.decalagePhase = Math.random() * Math.PI * 2;
                    this.angleTete = 0;
                    
                    // Initialiser les segments
                    for (let i = 0; i < this.longueurMax; i++) {
                        this.segments.push({
                            x: x - Math.cos(direction) * i * 5,
                            y: y - Math.sin(direction) * i * 3,
                            angle: direction
                        });
                    }
                }
                
                mettreAJour(temps) {
                    // Mouvement ondulatoire
                    const t = temps * 0.001;
                    const onde = Math.sin(t * this.vitesse * this.frequenceOnde + this.decalagePhase) * this.amplitudeOnde;
                    this.angleTete = this.direction + onde * 0.05;
                    
                    // Déplacer la tête
                    const tete = this.segments[0];
                    const nouvelleTete = {
                        x: tete.x + Math.cos(this.angleTete) * this.vitesse * 1.8,
                        y: tete.y + Math.sin(this.angleTete) * this.vitesse * 1.2,
                        angle: this.angleTete
                    };
                    
                    // Rebondir sur les bords
                    if (nouvelleTete.x < 60 || nouvelleTete.x > width() - 60) {
                        this.direction = Math.PI - this.direction;
                        nouvelleTete.x = tete.x + Math.cos(this.direction) * this.vitesse * 2;
                    }
                    if (nouvelleTete.y < 80 || nouvelleTete.y > height() - 60) {
                        this.direction = -this.direction;
                        nouvelleTete.y = tete.y + Math.sin(this.direction) * this.vitesse * 2;
                    }
                    
                    nouvelleTete.angle = this.direction;
                    
                    // Ajouter la nouvelle tête et retirer la queue
                    this.segments.unshift(nouvelleTete);
                    if (this.segments.length > this.longueurMax) {
                        this.segments.pop();
                    }
                    
                    // Mettre à jour les angles des segments
                    for (let i = 1; i < this.segments.length; i++) {
                        const prev = this.segments[i - 1];
                        const curr = this.segments[i];
                        curr.angle = Math.atan2(prev.y - curr.y, prev.x - curr.x);
                    }
                }
                
                dessiner(ctx) {
                    if (this.segments.length < 2) return;
                    
                    // Dessiner le corps
                    for (let i = this.segments.length - 1; i >= 1; i--) {
                        const seg = this.segments[i];
                        const prev = this.segments[i - 1];
                        
                        // Ombre portée
                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        ctx.shadowBlur = 8;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        // Dégradé du corps
                        const gradient = ctx.createLinearGradient(
                            seg.x - this.epaisseur/2, seg.y - this.epaisseur/2,
                            seg.x + this.epaisseur/2, seg.y + this.epaisseur/2
                        );
                        gradient.addColorStop(0, this.couleurCorps);
                        gradient.addColorStop(0.5, this.couleurVentre);
                        gradient.addColorStop(1, this.couleurCorps);
                        
                        ctx.beginPath();
                        ctx.arc(seg.x, seg.y, this.epaisseur * (0.7 + (i / this.segments.length) * 0.3), 0, Math.PI * 2);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                        
                        // Écailles décoratives
                        if (i % 3 === 0) {
                            ctx.beginPath();
                            ctx.arc(seg.x, seg.y, this.epaisseur * 0.3, 0, Math.PI * 2);
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.fill();
                        }
                        
                        ctx.restore();
                        
                        // Dessiner la connexion entre segments
                        ctx.beginPath();
                        ctx.moveTo(prev.x, prev.y);
                        ctx.lineTo(seg.x, seg.y);
                        ctx.lineWidth = this.epaisseur * 1.6;
                        ctx.strokeStyle = this.couleurCorps;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    
                    // Dessiner la tête
                    const tete = this.segments[0];
                    ctx.save();
                    ctx.translate(tete.x, tete.y);
                    ctx.rotate(tete.angle || 0);
                    
                    // Ombre de la tête
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;
                    
                    // Forme de la tête (ovale)
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.epaisseur * 1.4, this.epaisseur * 0.9, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.couleurTete;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Yeux
                    const yeuxX = this.epaisseur * 0.6;
                    const yeuxY = this.epaisseur * 0.5;
                    
                    // Oeil gauche
                    ctx.beginPath();
                    ctx.arc(-yeuxX, -yeuxY, this.epaisseur * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    // Pupille gauche
                    ctx.beginPath();
                    ctx.arc(-yeuxX + 1, -yeuxY, this.epaisseur * 0.18, 0, Math.PI * 2);
                    ctx.fillStyle = '#111111';
                    ctx.fill();
                    
                    // Oeil droit
                    ctx.beginPath();
                    ctx.arc(yeuxX, -yeuxY, this.epaisseur * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    // Pupille droite
                    ctx.beginPath();
                    ctx.arc(yeuxX + 1, -yeuxY, this.epaisseur * 0.18, 0, Math.PI * 2);
                    ctx.fillStyle = '#111111';
                    ctx.fill();
                    
                    // Narines
                    ctx.beginPath();
                    ctx.arc(-this.epaisseur * 0.2, this.epaisseur * 0.15, 2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.epaisseur * 0.2, this.epaisseur * 0.15, 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Langue fourchue
                    const langueSortie = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
                    ctx.beginPath();
                    ctx.moveTo(0, this.epaisseur * 0.8);
                    ctx.lineTo(-3, this.epaisseur * 0.8 + 12 * langueSortie);
                    ctx.moveTo(0, this.epaisseur * 0.8);
                    ctx.lineTo(3, this.epaisseur * 0.8 + 12 * langueSortie);
                    ctx.strokeStyle = '#cc3333';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    // Sourcils/marques
                    ctx.beginPath();
                    ctx.arc(-yeuxX, -yeuxY - this.epaisseur * 0.3, this.epaisseur * 0.4, 0.2, Math.PI - 0.2);
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(yeuxX, -yeuxY - this.epaisseur * 0.3, this.epaisseur * 0.4, 0.2, Math.PI - 0.2);
                    ctx.stroke();
                    
                    ctx.restore();
                    
                    // Texte du nom
                    if (this.nom) {
                        ctx.save();
                        ctx.font = 'bold 11px Arial';
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.textAlign = 'center';
                        ctx.fillText(this.nom, tete.x, tete.y - this.epaisseur * 1.8);
                        ctx.restore();
                    }
                }
            }
            
            // Créer les deux serpents
            const serpent1 = new Serpent(
                '#2ecc40', '#27ae60', '#a8e6cf',
                width() * 0.3, height() * 0.5,
                0.3, 1.8, '🐍 Vert'
            );
            
            const serpent2 = new Serpent(
                '#b10dc9', '#85144b', '#f0a6ca',
                width() * 0.7, height() * 0.5,
                Math.PI + 0.3, 1.9, '🐍 Pourpre'
            );
            
            // Particules d'ambiance
            const particules = [];
            for (let i = 0; i < 30; i++) {
                particules.push({
                    x: Math.random() * width(),
                    y: Math.random() * height(),
                    taille: Math.random() * 3 + 1,
                    vitesseX: (Math.random() - 0.5) * 0.4,
                    vitesseY: (Math.random() - 0.5) * 0.4,
                    opacite: Math.random() * 0.5 + 0.3
                });
            }
            
            // Animation
            function animer(timestamp) {
                ctx.clearRect(0, 0, width(), height());
                
                // Fond avec effet de profondeur
                const bgGradient = ctx.createRadialGradient(width()/2, height()/2, 50, width()/2, height()/2, width()/1.5);
                bgGradient.addColorStop(0, '#1a3050');
                bgGradient.addColorStop(1, '#091520');
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, width(), height());
                
                // Grille subtile
                ctx.strokeStyle = 'rgba(100, 150, 200, 0.05)';
                ctx.lineWidth = 1;
                for (let x = 0; x < width(); x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height());
                    ctx.stroke();
                }
                for (let y = 0; y < height(); y += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width(), y);
                    ctx.stroke();
                }
                
                // Particules flottantes
                particules.forEach(p => {
                    p.x += p.vitesseX;
                    p.y += p.vitesseY;
                    if (p.x < 0) p.x = width();
                    if (p.x > width()) p.x = 0;
                    if (p.y < 0) p.y = height();
                    if (p.y > height()) p.y = 0;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.taille, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(150, 200, 255, ${p.opacite})`;
                    ctx.fill();
                });
                
                // Mise à jour et dessin des serpents
                serpent1.mettreAJour(timestamp);
                serpent2.mettreAJour(timestamp);
                
                serpent1.dessiner(ctx);
                serpent2.dessiner(ctx);
                
                // Effet de lueur autour des serpents
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const tete1 = serpent1.segments[0];
                const gradient1 = ctx.createRadialGradient(tete1.x, tete1.y, 5, tete1.x, tete1.y, 40);
                gradient1.addColorStop(0, 'rgba(46, 204, 64, 0.4)');
                gradient1.addColorStop(1, 'rgba(46, 204, 64, 0)');
                ctx.fillStyle = gradient1;
                ctx.fillRect(tete1.x - 40, tete1.y - 40, 80, 80);
                
                const tete2 = serpent2.segments[0];
                const gradient2 = ctx.createRadialGradient(tete2.x, tete2.y, 5, tete2.x, tete2.y, 40);
                gradient2.addColorStop(0, 'rgba(177, 13, 201, 0.4)');
                gradient2.addColorStop(1, 'rgba(177, 13, 201, 0)');
                ctx.fillStyle = gradient2;
                ctx.fillRect(tete2.x - 40, tete2.y - 40, 80, 80);
                ctx.restore();
                
                requestAnimationFrame(animer);
            }
            
            requestAnimationFrame(animer);
            
            // Redimensionnement
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
        })();
    </script>
</body>
</html>
